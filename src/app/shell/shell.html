<div class="shell">
  @if (updateAvailable()) {
    <div class="update-banner" role="status">
      <span class="update-text">A new version is available!</span>
      <button type="button" class="update-action" (click)="updateApplication.emit()">
        Update
      </button>
    </div>
  }

  <header class="shell-header">
    <a routerLink="/" class="brand">
      <img class="brand-logo" src="icons/icon-72x72.png" width="28" height="28" alt="" />
      <span class="brand-title">Score Tracker</span>
    </a>

    <div class="header-actions">
      <button
        type="button"
        class="icon-button"
        [attr.aria-label]="theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
        [attr.aria-pressed]="theme() === 'dark'"
        (click)="toggleTheme.emit()"
      >
        <fa-icon [icon]="theme() === 'dark' ? 'sun' : 'moon'"></fa-icon>
      </button>
      <a class="icon-button" aria-label="players" routerLink="/SavedPlayers">
        <fa-icon icon="users"></fa-icon>
      </a>
    </div>
  </header>

  <main class="shell-content">
    <ng-content></ng-content>
  </main>
</div>
