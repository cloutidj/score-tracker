<div class="shell">
  @if (updateAvailable()) {
    <div class="update-banner" role="status">
      <span class="update-text">A new version is available!</span>
      <button type="button" class="update-action" (click)="updateApplication.emit()">
        Update
      </button>
    </div>
  }

  <mat-toolbar class="shell-header">
    <a routerLink="/" class="brand">
      <img class="brand-logo" src="icons/icon-72x72.png" width="28" height="28" alt=""/>
      <span class="brand-title st-truncate">Score Tracker</span>
    </a>

    <span class="header-spacer"></span>

    <st-toggle-icon-button [open]="theme() === 'light'"
                           icon="lightbulb"
                           [hasOutline]="true"
                           [label]="theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
                           (toggled)="toggleTheme.emit()"/>
    <st-toggle-icon-button [open]="panelService.openPanel() === 'players'"
                           icon="users"
                           label="Saved players"
                           (toggled)="panelService.toggle('players')"/>
    <st-toggle-icon-button [open]="panelService.openPanel() === 'ruleSets'"
                           icon="book"
                           label="Manage rule sets"
                           (toggled)="panelService.toggle('ruleSets')"/>
  </mat-toolbar>

  <main class="shell-content">
    <ng-content></ng-content>
  </main>
</div>
