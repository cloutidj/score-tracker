<div class="saved-players-wrapper">
  <st-smooth-grow [trigger]="showForm()">
    <clr-datagrid>
      <clr-dg-action-bar>
        <div class="btn-group">
          <button type="button" class="btn btn-sm btn-primary" (click)="onAdd()">
            <fa-icon icon="plus"></fa-icon> Add
          </button>
        </div>
      </clr-dg-action-bar>

      <clr-dg-column clrDgField="name">Name</clr-dg-column>
      <clr-dg-column clrDgField="color">
        Color
        <clr-dg-filter [clrDgFilter]="colorFilter">
          <st-color-filter
            #colorFilter
            [colors]="distinctColors(savedPlayerService.savedPlayers())"
          ></st-color-filter>
        </clr-dg-filter>
      </clr-dg-column>

      <clr-dg-row
        *clrDgItems="let player of savedPlayerService.savedPlayers()"
        [clrDgItem]="player"
      >
        <clr-dg-action-overflow>
          <button type="button" class="action-item" (click)="onEdit(player)">Edit</button>
          <button type="button" class="action-item" (click)="onDelete(player)">Delete</button>
        </clr-dg-action-overflow>
        <clr-dg-cell>{{ player.name }}</clr-dg-cell>
        <clr-dg-cell>
          <st-color-swatch class="clr-col-auto" [color]="player.color"></st-color-swatch>
        </clr-dg-cell>
      </clr-dg-row>
    </clr-datagrid>
  </st-smooth-grow>

  @if (showForm()) {
    <st-player-preferences-form
      [@formAnimation]
      [playerData]="currentPlayer()"
      (save)="saveValues($event)"
      (cancelEdit)="showForm.set(false)"
    ></st-player-preferences-form>
  }
</div>
