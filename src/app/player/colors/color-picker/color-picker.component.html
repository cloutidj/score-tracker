<!-- The trigger is a palette icon, not a swatch: the chosen color is already shown
     by the whole row repainting itself, so a swatch here would just duplicate it.
     Tapping the palette opens a grid of swatches (no names — the colors speak for
     themselves), and picking one recolors the row. -->
<button matIconButton type="button"
        class="color-trigger"
        [class.is-invalid]="invalid()"
        [class.has-color]="!!selectedColor()"
        [class.is-open]="menuOpen()"
        [disabled]="disabled()"
        [matMenuTriggerFor]="colorMenu"
        (menuOpened)="menuOpen.set(true)"
        (menuClosed)="menuOpen.set(false)"
        [attr.aria-label]="triggerLabel()">
  <fa-icon icon="palette"></fa-icon>
</button>

<mat-menu #colorMenu="matMenu" class="color-menu" xPosition="before">
  @for (color of playerColors; track hexString(color)) {
    <button mat-menu-item type="button"
            class="color-menu-item"
            [attr.aria-label]="colorLabel(color)"
            (click)="selectColor(color)">
      <st-color-swatch [color]="color" [active]="isSelected(color)"></st-color-swatch>
    </button>
  }
</mat-menu>
