<div class="player-info">
  <div class="identity-row">
    @if (allowImport()) {
      <button matIconButton type="button"
              class="mode-toggle"
              [attr.aria-label]="mode() === 'manual' ? 'Import from a saved player' : 'Switch to typing a name'"
              (click)="toggleMode()">
        <fa-icon [icon]="mode() === 'manual' ? 'user-plus' : 'keyboard'"></fa-icon>
      </button>
    }

    @if (allowImport() && mode() === 'import') {
      <mat-form-field class="identity-field" subscriptSizing="dynamic">
        <mat-label>Saved player</mat-label>
        <mat-select (selectionChange)="importPlayer($event.value)">
          @for (saved of savedPlayerService.savedPlayers(); track saved.playerPreferenceId) {
            <mat-option [value]="saved">{{ saved.name }}</mat-option>
          } @empty {
            <mat-option [disabled]="true">No saved players</mat-option>
          }
        </mat-select>
      </mat-form-field>
    } @else {
      <!-- No `mat-error` text: an invalid name is shown via the field's own error
           state (red label/underline), which keeps every row the same height. -->
      <mat-form-field class="identity-field" subscriptSizing="dynamic">
        <mat-label>Player Name</mat-label>
        <input matInput type="text" [formField]="field().name"/>
      </mat-form-field>
    }

    <!-- Same treatment for color: the picker shows its own error ring (invalid + touched,
         read off its bound field) instead of a message that would push the row taller. -->
    <st-color-picker class="color-field"
                     [formField]="field().color"
                     aria-label="Player color">
    </st-color-picker>
  </div>
</div>
