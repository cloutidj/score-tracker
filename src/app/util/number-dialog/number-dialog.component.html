<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content>
  <mat-form-field class="number-dialog-field">
    <mat-label>Enter Value</mat-label>
    <input matInput
           type="number"
           name="numberValue"
           [ngModel]="numberValue()"
           (ngModelChange)="numberValue.set($event)"
           (keyup.enter)="submit()"
           cdkFocusInitial/>
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button matButton type="button" (click)="cancel()">Cancel</button>
  <button matButton="filled" type="button" (click)="submit()">Ok</button>
</mat-dialog-actions>
