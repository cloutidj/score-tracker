<div class="number-dialog" [stPlayerColor]="data.player.color">
  <st-score-entry-header mat-dialog-title [name]="data.player.name" [action]="data.action">
  </st-score-entry-header>
  <mat-dialog-content>
    <st-number-pad [value]="data.value ?? null" (enter)="confirm($event)"></st-number-pad>
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button matButton type="button" class="dialog-button" (click)="cancel()">Cancel</button>
  </mat-dialog-actions>
</div>
