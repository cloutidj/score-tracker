<div class="number-dialog" [stPlayerColor]="data.playerColor">
  <h2 mat-dialog-title>{{ data.title }}</h2>
  <mat-dialog-content>
    <st-number-pad [value]="data.value ?? null" (enter)="confirm($event)"></st-number-pad>
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button matButton type="button" class="dialog-button" (click)="cancel()">Cancel</button>
  </mat-dialog-actions>
</div>
