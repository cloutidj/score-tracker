<div class="number-pad-wrapper">
  @for (btn of buttonValues; track btn) {
    <button matButton="filled" class="score-button" [ngClass]="getButtonClass(btn)" (click)="score.emit(btn)">
      {{ btn }}
    </button>
  }

  <button type="button" matButton="outlined" class="custom-score-button" (click)="selectCustomVal()">
    <fa-icon icon="keyboard"></fa-icon>
  </button>
</div>
