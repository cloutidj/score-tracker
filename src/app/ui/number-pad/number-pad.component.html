<div class="number-pad-wrapper">
  <div class="number-display" aria-live="polite">{{ displayValue() }}</div>

  @for (digit of digitKeys; track digit) {
    <button matButton="filled" type="button" class="pad-key digit-key" (click)="append(digit)">
      {{ digit }}
    </button>
  }

  <button matButton="filled" type="button" class="pad-key sign-key" aria-label="toggle sign"
          (click)="toggleSign()">
    <fa-icon icon="plus-minus"></fa-icon>
  </button>

  <button matButton="filled" type="button" class="pad-key digit-key zero-key" (click)="append(0)">
    0
  </button>

  <button matButton="filled" type="button" class="pad-key delete-key" aria-label="delete"
          (click)="backspace()">
    <fa-icon icon="delete-left"></fa-icon>
  </button>

  <button matButton="filled" type="button" class="pad-key enter-key" (click)="confirm()">
    Enter
  </button>
</div>
